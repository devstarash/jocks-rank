<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jocks Rank — Рейтинг качков Иркутска</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="#/" class="text-xl font-black">Jocks Rank</a>
            <div id="auth-buttons">
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full">
        <div id="app">
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12">
        <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div>
                <h4 class="text-white font-bold mb-3">Jocks Rank</h4>
                <p class="text-sm">Рейтинг качков Иркутска</p>
            </div>
            <div>
                <h4 class="text-white font-bold mb-3">Категории</h4>
                <ul class="space-y-1 text-sm">
                    <li><a href="#/leaderboard/pullups" class="hover:text-white">Подтягивания</a></li>
                    <li><a href="#/leaderboard/bench" class="hover:text-white">Жим</a></li>
                    <li><a href="#/leaderboard/complex" class="hover:text-white">Комплекс</a></li>
                </ul>
            </div>
            <div>
                <h4 class="text-white font-bold mb-3">Ещё</h4>
                <ul class="space-y-1 text-sm">
                    <li><a href="#/leaderboard/one-rep" class="hover:text-white">На раз</a></li>
                    <li><a href="#/leaderboard/tonnage" class="hover:text-white">Тоннаж</a></li>
                </ul>
            </div>
            <div>
                <h4 class="text-white font-bold mb-3">Аккаунт</h4>
                <ul class="space-y-1 text-sm">
                    <li><a href="#/login" class="hover:text-white">Войти</a></li>
                    <li><a href="#/register" class="hover:text-white">Регистрация</a></li>
                </ul>
            </div>
        </div>
        <div class="text-center mt-8 text-xs">&copy; 2026 Jocks Rank. Иркутск.</div>
    </footer>

    <div id="add-result-modal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl relative">
            <button onclick="toggleModal('add-result-modal')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-lg">✕</button>
            <h3 class="text-xl font-black text-slate-950 mb-4">Добавить результат</h3>
            <form onsubmit="handleAddResult(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Категория</label>
                    <select id="add-result-category" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900" required>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Результат</label>
                    <input type="number" id="add-result-value" placeholder="Значение" step="0.01" min="0.01"
                           class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Примечание</label>
                    <input type="text" id="add-result-note" placeholder="Необязательно"
                           class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold text-sm py-2.5 rounded-lg hover:bg-blue-700 transition">
                    Добавить
                </button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
